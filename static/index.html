<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Something from Everything — 3D Intelligence Dashboard">
    <title>Something from Everything — 3D Intelligence Dashboard</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔮</text></svg>">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- Three.js + 3D Force Graph -->
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three-spritetext@1.8.2/dist/three-spritetext.min.js"></script>
    <script src="https://unpkg.com/3d-force-graph@1.73.3/dist/3d-force-graph.min.js"></script>

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <!-- ═══ Full-Screen 3D Canvas ═══════════════════════ -->
    <div id="3d-graph"></div>

    <!-- ═══ Floating UI Overlay Layer ═══════════════════ -->

    <!-- Top Bar -->
    <header id="top-bar">
        <div class="top-left">
            <div class="brand">
                <span class="brand-icon">🔮</span>
                <div>
                    <div class="brand-name">Something from Everything</div>
                    <div class="brand-sub">3D Intelligence Matrix</div>
                </div>
            </div>
        </div>
        <div class="top-right">
            <div class="pill" id="llm-pill">
                <span class="dot offline" id="llm-dot"></span>
                <span id="llm-text">LLM Offline</span>
            </div>
            <div class="pill" id="ws-pill">
                <span class="dot offline" id="ws-dot"></span>
                <span id="ws-text">Disconnected</span>
            </div>
        </div>
    </header>

    <!-- Left: Stats -->
    <div id="stats-panel" class="glass-panel">
        <div class="mini-stat">
            <span class="mini-label">DATA NODES</span>
            <span class="mini-value" id="stat-data">0</span>
        </div>
        <div class="mini-stat">
            <span class="mini-label">INSIGHTS</span>
            <span class="mini-value" id="stat-insights">0</span>
        </div>
        <div class="mini-stat">
            <span class="mini-label">ALERTS</span>
            <span class="mini-value" id="stat-alerts">0</span>
        </div>
        <div class="mini-stat">
            <span class="mini-label">LINKS</span>
            <span class="mini-value" id="stat-links">0</span>
        </div>
    </div>

    <!-- Bottom Left: Actions -->
    <div id="actions-panel" class="glass-panel">
        <button class="btn btn-glow" id="btn-collect" onclick="doCollect()">⚡ Collect Data</button>
        <button class="btn btn-outline" id="btn-analyze" onclick="doAnalyze()">🧠 Find Patterns</button>
        <button class="btn btn-ghost" onclick="reloadGraph()">🔄 Reload</button>
        <button class="btn btn-ghost" onclick="recenter()">🎯 Recenter</button>
    </div>

    <!-- Bottom Right: Legend -->
    <div id="legend-panel" class="glass-panel">
        <div class="legend-title">🧭 Node Types</div>
        <div class="legend-grid">
            <span class="lg-dot" style="background:#00d4ff;border-radius:50%"></span><span>RSS</span>
            <span class="lg-dot" style="background:#ec4899"></span><span>Reddit</span>
            <span class="lg-dot"
                style="background:#f59e0b;border-radius:50%;border:2px solid #f59e0b;background:transparent"></span><span>HackerNews</span>
            <span class="lg-dot"
                style="background:#10b981;clip-path:polygon(50% 0%,0% 100%,100% 100%)"></span><span>Finance</span>
            <span class="lg-dot" style="background:#a855f7;border-radius:50%"></span><span>Weather</span>
            <span class="lg-dot" style="background:#39ff14;border-radius:2px"></span><span>CertStream</span>
            <span class="lg-dot" style="background:#ff4500;border-radius:50%"></span><span>GDELT</span>
            <span class="lg-dot" style="background:#8a2be2;border-radius:50%"></span><span>OpenPhish</span>
            <span class="lg-dot lg-glow" style="background:#ef4444"></span><span>🔴 Critical</span>
            <span class="lg-dot lg-glow" style="background:#f59e0b"></span><span>🟡 High</span>
            <span class="lg-dot lg-glow" style="background:#00d4ff"></span><span>🔵 Medium</span>
        </div>
    </div>

    <!-- Right: Detail Panel (slides in) -->
    <aside id="detail-panel">
        <div class="detail-head">
            <h3 id="detail-title">Node Details</h3>
            <button class="btn-x" onclick="closeDetail()">✕</button>
        </div>
        <div id="detail-body" class="detail-body">
            <p class="muted">Click any node in the 3D space to inspect it.</p>
        </div>
    </aside>

    <!-- Toasts -->
    <div id="toasts"></div>

    <script src="/static/app.js"></script>
</body>

</html>
